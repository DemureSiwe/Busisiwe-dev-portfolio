<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Luckiest+Guy&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />

    <title>Busisiwe Developer Portfolio</title>
  </head>
  <body>
    <div class="bgGlow">
      <div class="appShell">
        <nav class="navRail">
          <div class="navLogo"><i class="fa-solid fa-shield"></i></div>
          <div class="navLinks">
            <a href="#" class="navBtn" active
              ><i class="fa-solid fa-chart-bar"></i
            ></a>
            <a href="#" class="navBtn"><i class="fa-solid fa-thumbs-up"></i></a>
            <a href="#" class="navBtn"><i class="fa-solid fa-terminal"></i></a>
            <a href="#" class="navBtn"><i class="fa-solid fa-comment"></i></a>
          </div>
          <div class="navBottom">
            <a href="#" class="navBtn"><i class="fa-solid fa-gear"></i></a>
          </div>
        </nav>

        <main class="grid">
          <section class="cardHero hero">
            <div class="heroContent">
              <h1 class="heroTittle">Busisiwe<br /><span>Tsetseng</span></h1>
              <p class="heroSubtittles">
                <i class="fa-solid fa-quote-left"></i> I'm a front-end developer
                who builds clean, morden and responsive websites with stong
                focus on usability <i class="fa-solid fa-quote-right"></i>
              </p>
            </div>
            <div class="blobImage"></div>
          </section>

          <aside class="cardHero workList">
            <h3 class="cardTittle"><i class="fa-solid fa-fire"></i>Features</h3>
            <div class="workItem">
              <span><i class="fa-solid fa-building-columns"></i></span
              ><i class="fa-solid fa-square-arrow-up-right"></i>
            </div>
            <div class="workItem">
              <span><i class="fa-solid fa-microchip"></i></span
              ><i class="fa-solid fa-square-arrow-up-right"></i>
            </div>
            <div class="workItem">
              <span><i class="fa-solid fa-cloud"></i></span
              ><i class="fa-solid fa-square-arrow-up-right"></i>
            </div>
            <div class="workItem">
              <span><i class="fa-solid fa-mobile-screen-button"></i></span
              ><i class="fa-solid fa-square-arrow-up-right"></i>
            </div>
            <div class="workItem">
              <span><i class="fa-solid fa-database"></i></span
              ><i class="fa-solid fa-square-arrow-up-right"></i>
            </div>
          </aside>

          <div class="cardHero statsCard">
            <i class="fa-solid fa-globe statIcon"></i>
            <div class="statV">120+</div>
            <p class="statLable">SNIPPED UNITS</p>
          </div>

          <section class="cardHero stackCard">
            <h3 class="cardTittle">
              <i class="fa-solid fa-code"></i>Core Stack
            </h3>
            <div class="stackGrid">
              <div class="stackItem">
                <i class="fa-brands fa-html5"></i>HTML
              </div>
              <div class="stackItem">
                <i class="fa-brands fa-css3-alt"></i>CSS
              </div>
              <div class="stackItem">
                <i class="fa-brands fa-square-js"></i>JavaScript
              </div>
              <div class="stackItem">
                <i class="fa-brands fa-react"></i>React
              </div>
              <div class="stackItem">
                <i class="fa-solid fa-pen-fancy"></i> Tailwind
              </div>
              <div class="stackItem">
                <i class="fa-brands fa-figma"></i>Figma
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/0604c62f53.js"
      crossorigin="anonymous"
    ></script>
    <script src="./src/scripts.js"></script>
  </body>
</html>
